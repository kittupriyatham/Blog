<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Blog Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-xl shadow-md w-full max-w-sm p-8">
    <!-- Logo / Brand -->
    <div class="flex flex-col items-center mb-6">
      <div class="w-14 h-14 rounded-full bg-blue-600 flex items-center justify-center mb-3">
        <span class="text-white text-2xl font-bold">B</span>
      </div>
      <h1 class="text-xl font-semibold text-gray-800">Sign in to Blog Admin</h1>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="mb-4 px-4 py-2 rounded text-sm
          {% if category == 'error' %}bg-red-100 text-red-700{% else %}bg-green-100 text-green-700{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="username">Username</label>
        <input id="username" name="username" type="text" required autocomplete="username"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
        <input id="password" name="password" type="password" required autocomplete="current-password"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg text-sm transition">
        Sign In
      </button>
    </form>

    <p class="mt-4 text-center text-xs text-gray-400">
      <a href="{{ url_for('index') }}" class="hover:underline text-blue-500">← Back to feed</a>
    </p>
  </div>
</body>
</html>
